<!-- view.html -->
<p-toast></p-toast>

<div *ngIf="loading" class="flex justify-center items-center h-[50vh]">
    <p-progressspinner ariaLabel="loading" />
</div>

<div *ngIf="!loading && course" class="animate-fade-in flex flex-col gap-8">
    <!-- Top: Core Info & Pricing -->
    <app-course-details 
        [course]="course" 
        (back)="onBack()" 
        (edit)="onEdit()">
    </app-course-details>

    <!-- Middle: Curriculum (Outcomes, Requirements, Audience) -->
    <app-course-curriculum 
        [course]="course">
    </app-course-curriculum>

    <!-- Bottom: Media Assets (Thumbnail & Hero Image) -->
    <app-course-media 
        [course]="course">
    </app-course-media>
</div>

<div *ngIf="!loading && !course" class="flex flex-col items-center justify-center h-[50vh] gap-4">
    <i class="pi pi-exclamation-triangle text-6xl text-surface-400"></i>
    <span class="text-xl font-semibold text-surface-500">Course not found or failed to load.</span>
    <p-button label="Back to List" icon="pi pi-arrow-left" (onClick)="onBack()" />
</div>
