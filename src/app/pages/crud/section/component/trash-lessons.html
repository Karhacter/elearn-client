<div class="flex flex-col gap-4 p-2">
    <!-- Header Toolbar -->
    <div class="flex items-center justify-between gap-3 mb-2">
        <div class="flex items-center gap-2">
            <h5 class="m-0 font-bold text-lg text-surface-900 dark:text-surface-0">Deleted Lessons</h5>
            <p-tag [value]="lessons().length.toString()" severity="secondary" rounded />
        </div>
        <div class="flex gap-2">
            <p-button 
                label="Restore Selected" 
                icon="pi pi-refresh" 
                severity="success" 
                [outlined]="true"
                [disabled]="!selectedLessons || !selectedLessons.length" 
                (onClick)="restoreSelected()" />
            <p-button 
                icon="pi pi-sync" 
                [text]="true"
                severity="secondary" 
                (onClick)="loadDeletedLessons()" 
                [loading]="loading()" />
        </div>
    </div>

    <!-- Table -->
    <div class="border border-surface-200 dark:border-surface-700 rounded-lg overflow-hidden box-border">
        <p-table
            [value]="lessons()"
            [(selection)]="selectedLessons"
            dataKey="id"
            [loading]="loading()"
            styleClass="p-datatable-sm"
            [responsiveLayout]="'scroll'"
            [scrollable]="true"
            scrollHeight="400px"
        >
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 3rem">
                        <p-tableHeaderCheckbox />
                    </th>
                    <th style="min-width: 12rem">Title</th>
                    <th style="width: 8rem">Type</th>
                    <th style="width: 8rem">Duration</th>
                    <th style="width: 4rem"></th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-lesson>
                <tr class="hover:bg-surface-50 dark:hover:bg-surface-900/50 transition-colors">
                    <td>
                        <p-tableCheckbox [value]="lesson" />
                    </td>
                    <td class="font-medium text-surface-900 dark:text-surface-0">{{ lesson.title }}</td>
                    <td>
                        <p-tag [value]="lesson.type || '-'" severity="secondary" />
                    </td>
                    <td class="text-surface-600 dark:text-surface-400 font-mono text-sm">
                        {{ formatDuration(lesson.duration) }}
                    </td>
                    <td class="text-right">
                        <button 
                            type="button" 
                            pButton 
                            pRipple 
                            icon="pi pi-refresh" 
                            class="p-button-text p-button-success p-button-sm" 
                            (click)="restoreLesson(lesson)"
                            pTooltip="Restore lesson"
                            tooltipPosition="left">
                        </button>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="5" class="text-center py-8 text-surface-500">
                        <div class="flex flex-col items-center gap-2">
                            <i class="pi pi-inbox text-3xl opacity-20"></i>
                            <span>No deleted lessons found.</span>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
