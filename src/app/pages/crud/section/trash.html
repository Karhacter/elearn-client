<p-toast />

<!-- ── Toolbar ──────────────────────────────────────────── -->
<p-toolbar styleClass="mb-6 bg-surface-0 dark:bg-surface-900 shadow-sm border border-surface-200 dark:border-surface-700 rounded-xl">
    <ng-template #start>
        <div class="flex items-center gap-3">
            <p-button 
                icon="pi pi-arrow-left" 
                severity="secondary" 
                text 
                [routerLink]="['/pages/components/course', courseId, 'section', 'list']" 
                pTooltip="Back to Sections"
            />
            <h5 class="m-0 font-bold text-xl">Section Trash</h5>
        </div>
    </ng-template>

    <ng-template #end>
        <p-button
            label="Restore Selected"
            icon="pi pi-refresh"
            severity="success"
            class="mr-2"
            (onClick)="restoreSelected()"
            [disabled]="!selectedSections || !selectedSections.length"
        />
        <p-button
            label="Export"
            icon="pi pi-download"
            severity="secondary"
            (onClick)="exportCSV()"
            text
        />
    </ng-template>
</p-toolbar>

<!-- ── Data Table ────────────────────────────────────────── -->
<div class="card p-0 overflow-hidden rounded-xl border border-surface-200 dark:border-surface-700">
    <p-table
        #dt
        [value]="sections()"
        [columns]="cols"
        [rows]="10"
        [paginator]="true"
        [loading]="loading()"
        [tableStyle]="{ 'min-width': '60rem' }"
        [(selection)]="selectedSections"
        [rowHover]="true"
        dataKey="id"
        styleClass="p-datatable-sm"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} sections"
        [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[10, 20, 30]"
        [globalFilterFields]="['title', 'description']"
    >
        <ng-template #caption>
            <div class="flex items-center justify-between px-2 py-1">
                <span class="text-surface-500 text-sm">Review and restore previously deleted curriculum sections.</span>
                <p-iconfield>
                    <p-inputicon styleClass="pi pi-search" />
                    <input
                        pInputText
                        type="text"
                        (input)="onGlobalFilter(dt, $event)"
                        placeholder="Search trash..."
                        class="w-64"
                    />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th style="width: 4rem">
                    <p-tableHeaderCheckbox />
                </th>
                <th pSortableColumn="order" style="width: 8rem">
                    Order <p-sortIcon field="order" />
                </th>
                <th pSortableColumn="title" style="min-width: 14rem">
                    Title <p-sortIcon field="title" />
                </th>
                <th pSortableColumn="description" style="min-width: 20rem">
                    Description <p-sortIcon field="description" />
                </th>
                <th style="width: 8rem" class="text-center">Actions</th>
            </tr>
        </ng-template>

        <ng-template #body let-section>
            <tr class="hover:bg-surface-50 dark:hover:bg-surface-800 transition-colors">
                <td>
                    <p-tableCheckbox [value]="section" />
                </td>
                <td>
                    <span class="font-mono text-surface-500 font-medium">#{{ section.order }}</span>
                </td>
                <td class="font-semibold text-surface-900 dark:text-surface-0">{{ section.title }}</td>
                <td class="text-surface-600 dark:text-surface-400">
                    {{ section.description || 'No description provided' }}
                </td>
                <td class="text-center">
                    <p-button
                        icon="pi pi-refresh"
                        [rounded]="true"
                        [outlined]="true"
                        severity="success"
                        pTooltip="Restore Section"
                        (click)="restoreSection(section)"
                    />
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="5" class="text-center p-12 text-surface-500">
                    <div class="flex flex-col items-center gap-3">
                        <i class="pi pi-trash text-5xl opacity-10"></i>
                        <span class="text-lg">Section trash is empty</span>
                        <p-button 
                            label="Back to Sections" 
                            icon="pi pi-arrow-left" 
                            [routerLink]="['/pages/components/course', courseId, 'section', 'list']" 
                            text 
                        />
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-confirmdialog [style]="{ width: '450px' }" appendTo="body" />
