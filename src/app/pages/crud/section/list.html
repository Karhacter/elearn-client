<div class="card p-6 rounded-xl border border-surface-200 dark:border-surface-700 shadow-sm">
    <div class="flex flex-col gap-6">
        <div class="flex flex-col gap-2">
            <h1 class="text-4xl font-extrabold text-surface-900 dark:text-surface-0 m-0">Course List</h1>
            <p class="text-lg text-surface-500 m-0">Select a course to manage its sections and lessons.</p>
        </div>

        <p-table
            [value]="allCourses()"
            [rows]="10"
            [paginator]="true"
            [lazy]="true"
            (onLazyLoad)="loadCourses($event)"
            [totalRecords]="totalRecords"
            [loading]="loading()"
            [rowHover]="true"
            responsiveLayout="scroll"
            [globalFilterFields]="['title', 'instructorName', 'status']"
            styleClass="p-datatable-gridlines"
        >
            <ng-template #header>
                <tr>
                    <th style="width: 15rem">Thumbnail</th>
                    <th pSortableColumn="title" style="min-width: 20rem">Course Title <p-sortIcon field="title" /></th>
                    <th pSortableColumn="instructorName" style="width: 15rem">Instructor <p-sortIcon field="instructorName" /></th>
                    <th pSortableColumn="status" style="width: 10rem">Status <p-sortIcon field="status" /></th>
                    <th style="width: 12rem" class="text-center">Select</th>
                </tr>
            </ng-template>
            <ng-template #body let-course>
                <tr>
                    <td>
                        <img [src]="getThumbnailUrl(course.thumbnail)" [alt]="course.title" class="w-full h-20 object-cover rounded shadow-sm" />
                    </td>
                    <td>
                        <div class="flex flex-col gap-1">
                            <span class="font-bold text-lg text-surface-900 dark:text-surface-0">{{ course.title }}</span>
                            <span class="text-sm text-surface-500">{{ course.genreName }}</span>
                        </div>
                    </td>
                    <td>
                        <div class="flex items-center gap-2">
                            <p-avatar icon="pi pi-user" shape="circle" />
                            <span>{{ course.instructorName }}</span>
                        </div>
                    </td>
                    <td>
                        <p-tag [value]="course.status" [severity]="course.status === 'Published' ? 'success' : 'warn'" />
                    </td>
                    <td class="text-center">
                        <p-button label="Manage Section" icon="pi pi-list" [rounded]="true" severity="primary" (click)="onCourseSelect(course.courseId)" />
                    </td>
                </tr>
            </ng-template>
            <ng-template #emptymessage>
                <tr>
                    <td colspan="5" class="text-center p-12 text-surface-500">
                        <i class="pi pi-inbox text-5xl mb-4 opacity-20"></i>
                        <p>No courses found. Please create a course first.</p>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
