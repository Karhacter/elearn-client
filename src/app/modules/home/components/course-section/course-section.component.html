<section class="border-b border-slate-100 bg-slate-50 py-14 md:py-20 dark:border-white/5 dark:bg-transparent">
  <div class="container">
    <div class="mb-10 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h2
          class="!text-3xl font-bold tracking-tight text-slate-900 sm:!text-4xl md:!text-5xl dark:!text-white"
        >
          {{ titleParts.before }}
          <span class="relative inline-block">
            <span
              class="text-blue-600 dark:bg-gradient-to-r dark:from-cyan-400 dark:to-fuchsia-500 dark:bg-clip-text dark:text-transparent"
              >{{ highlightWord }}</span
            >
            <span
              class="absolute -bottom-1 left-0 h-1 w-full rounded-full bg-blue-600 dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-500 dark:opacity-80 dark:shadow-[0_0_12px_rgba(217,70,239,0.6)]"
            ></span>
          </span>
          {{ titleParts.after }}
        </h2>
        <p class="mt-3 max-w-2xl text-sm text-slate-600 md:text-base dark:text-slate-400">
          {{ subtitle }}
        </p>
      </div>
      <button
        type="button"
        (click)="onViewAll()"
        class="shrink-0 self-start text-sm font-semibold text-blue-600 transition hover:text-blue-800 dark:text-cyan-400 dark:hover:text-fuchsia-300 sm:self-auto"
      >
        {{ viewAllLabel }} →
      </button>
    </div>

    @if (!loading && courses.length === 0) {
      <p
        class="rounded-2xl border border-dashed border-slate-200 bg-white px-6 py-12 text-center text-slate-500 dark:border-white/15 dark:bg-white/[0.03]"
      >
        {{ emptyMessage }}
      </p>
    } @else {
      <div
        class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"
      >
        @if (loading) {
          @for (s of [1, 2, 3, 4]; track s) {
            <app-course-card [loading]="true" />
          }
        } @else {
          @for (c of courses; track c.id) {
            <app-course-card [course]="c" (selected)="onCourse($event)" />
          }
        }
      </div>
    }
  </div>
</section>
