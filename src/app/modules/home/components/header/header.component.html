<header
  class="sticky top-0 z-50 border-b border-slate-200/80 bg-white/90 backdrop-blur-xl dark:border-cyan-500/20 dark:bg-[#070714]/80"
>
  <div class="container flex flex-wrap items-center justify-between gap-4 py-4 lg:flex-nowrap">
    <a
      routerLink="/"
      class="group flex shrink-0 items-center gap-2 font-semibold tracking-tight text-slate-900 dark:text-white"
    >
      <span
        class="flex h-9 w-9 items-center justify-center rounded-lg border border-blue-200 bg-blue-50 text-blue-700 shadow-sm transition group-hover:bg-blue-100 dark:border-cyan-400/40 dark:bg-gradient-to-br dark:from-cyan-500/20 dark:to-fuchsia-500/20 dark:text-cyan-300 dark:shadow-[0_0_20px_rgba(34,211,238,0.35)] dark:group-hover:shadow-[0_0_28px_rgba(217,70,239,0.45)]"
      >
        <span class="text-lg font-black">N</span>
      </span>
      <span class="text-lg">{{ logoLabel }}</span>
    </a>

    <nav
      class="order-3 flex w-full flex-wrap justify-center gap-1 text-sm font-medium text-slate-600 lg:order-none lg:w-auto lg:justify-start dark:text-slate-300"
    >
      @for (item of navItems; track item.label) {
        <a
          [routerLink]="item.route || '/'"
          class="rounded-lg px-3 py-2 transition hover:bg-slate-100 hover:text-blue-700 dark:hover:bg-white/5 dark:hover:text-cyan-300 dark:hover:shadow-[0_0_12px_rgba(34,211,238,0.2)]"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="flex flex-1 items-center justify-end gap-2 sm:gap-3 lg:max-w-md">
      <form
        class="relative hidden min-w-0 flex-1 sm:block"
        (submit)="$event.preventDefault(); onSearchSubmit()"
      >
        <input
          type="search"
          [(ngModel)]="searchQuery"
          name="q"
          [placeholder]="searchPlaceholder"
          class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-10 pr-3 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 dark:border-white/10 dark:bg-white/5 dark:text-slate-100 dark:placeholder:text-slate-500 dark:focus:border-cyan-400/50 dark:focus:ring-cyan-400/50"
        />
        <svg
          class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-blue-500 dark:text-cyan-400/80"
          fill="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
          />
        </svg>
      </form>

      <button
        type="button"
        (click)="theme.toggle()"
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:bg-slate-50 dark:border-white/15 dark:bg-white/5 dark:text-amber-200 dark:shadow-none dark:hover:bg-white/10"
        [attr.aria-label]="theme.dark() ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.aria-pressed]="theme.dark()"
      >
        @if (theme.dark()) {
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 00-1.41-1.41l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06z"
            />
          </svg>
        } @else {
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12.34 2.02c.12-.01.24-.02.36-.02C9.5 2 6.75 4.61 6.08 8.04A6.99 6.99 0 0112 3c.23 0 .44.02.66.03-.16-.66-.34-1.32-.32-2.01zm3.95 1.93c.62 1.22 1 2.59 1 4.05 0 4.42-3.58 8-8 8-1.46 0-2.83-.38-4.05-1 2.72 2.72 6.47 4.41 10.63 4.36 4.86-.06 9.25-3.27 10.68-7.93-1.03 3.7-4.09 6.65-7.93 7.93-4.16.05-7.91-1.64-10.63-4.36A7.962 7.962 0 014 12c0-3.04 1.73-5.68 4.26-6.99-.13.44-.22.9-.26 1.37-.48-.06-.97-.09-1.47-.09-2.42 0-4.68.65-6.63 1.78.99 3.45 3.04 6.45 5.82 8.55a7.998 7.998 0 01-2.83-6.24c0-4.42 3.58-8 8-8 2.21 0 4.21.9 5.66 2.34z"
            />
          </svg>
        }
      </button>

      <button
        type="button"
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-slate-200 bg-slate-50 transition hover:border-blue-300 dark:border-fuchsia-500/30 dark:bg-white/5 dark:shadow-[0_0_16px_rgba(217,70,239,0.25)] dark:hover:scale-105 dark:hover:border-fuchsia-400/60"
        (click)="onAvatar()"
        [attr.aria-label]="'Account: ' + (user?.name || 'Guest')"
      >
        @if (user) {
          <img
            [src]="user.avatarUrl"
            [alt]="user.name"
            class="h-9 w-9 rounded-full object-cover ring-2 ring-blue-200 dark:ring-cyan-400/40"
          />
        } @else {
          <svg
            class="h-7 w-7 text-slate-400 dark:text-slate-300"
            fill="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2a7.2 7.2 0 01-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 01-6 3.22z"
            />
          </svg>
        }
      </button>

      <button
        type="button"
        (click)="onCta()"
        class="hidden shrink-0 rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 sm:inline-flex dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-600 dark:shadow-[0_0_24px_rgba(34,211,238,0.35)] dark:hover:brightness-110 dark:hover:shadow-[0_0_32px_rgba(217,70,239,0.45)]"
      >
        {{ ctaLabel }}
      </button>
    </div>
  </div>

  <form
    class="container pb-4 sm:hidden"
    (submit)="$event.preventDefault(); onSearchSubmit()"
  >
    <div class="relative">
      <input
        type="search"
        [(ngModel)]="searchQuery"
        name="qm"
        [placeholder]="searchPlaceholder"
        class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-10 pr-3 text-sm text-slate-900 placeholder:text-slate-400 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 dark:border-white/10 dark:bg-white/5 dark:text-slate-100 dark:focus:border-cyan-400/50 dark:focus:ring-cyan-400/40"
      />
      <svg
        class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-blue-500 dark:text-cyan-400/80"
        fill="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
        />
      </svg>
    </div>
  </form>
</header>
