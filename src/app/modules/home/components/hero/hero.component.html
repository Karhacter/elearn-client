<section
  class="relative overflow-hidden border-b border-slate-100 bg-slate-50 py-16 md:py-24 dark:border-white/5 dark:bg-[#05050c]"
>
  <div
    class="pointer-events-none absolute inset-0 bg-gradient-to-b from-blue-50/80 to-transparent opacity-100 dark:bg-[radial-gradient(ellipse_at_top,_rgba(34,211,238,0.12),_transparent_55%),radial-gradient(ellipse_at_bottom_right,_rgba(217,70,239,0.15),_transparent_50%)]"
  ></div>
  <div
    class="pointer-events-none absolute -left-32 top-20 h-72 w-72 rounded-full bg-blue-200/40 blur-3xl dark:bg-cyan-500/10"
  ></div>
  <div
    class="pointer-events-none absolute -right-20 bottom-0 h-80 w-80 rounded-full bg-indigo-200/50 blur-3xl dark:bg-fuchsia-600/15"
  ></div>

  <div class="container relative grid grid-cols-1 items-center gap-12 lg:grid-cols-12 lg:gap-8">
    <div class="lg:col-span-5">
      <p
        class="mb-4 inline-flex items-center gap-2 rounded-full border border-blue-200 bg-blue-50 px-4 py-1.5 text-xs font-semibold uppercase tracking-widest text-blue-800 dark:border-cyan-500/30 dark:bg-white/5 dark:text-cyan-300 dark:shadow-[0_0_20px_rgba(34,211,238,0.15)]"
      >
        <span class="h-1.5 w-1.5 animate-pulse rounded-full bg-blue-500 dark:bg-cyan-400"></span>
        Live cohorts · New paths weekly
      </p>
      <h1
        class="!text-4xl font-bold leading-tight tracking-tight text-slate-900 sm:!text-5xl md:!text-6xl lg:!text-[3.25rem] xl:!text-6xl dark:!text-white"
      >
        {{ headline }}
        <span class="relative inline-block">
          <span
            class="text-blue-600 dark:bg-gradient-to-r dark:from-cyan-400 dark:via-fuchsia-400 dark:to-pink-400 dark:bg-clip-text dark:text-transparent dark:drop-shadow-[0_0_18px_rgba(34,211,238,0.45)]"
          >
            {{ accentWord }}
          </span>
          <span
            class="absolute -bottom-1 left-0 h-1 w-full rounded-full bg-blue-600 dark:bg-gradient-to-r dark:from-cyan-400 dark:to-fuchsia-500 dark:opacity-90 dark:shadow-[0_0_12px_rgba(217,70,239,0.8)]"
          ></span>
        </span>
        {{ headlineSuffix }}
      </h1>
      <p
        class="mt-6 max-w-xl text-base leading-relaxed text-slate-600 md:text-lg dark:text-slate-400"
      >
        {{ subcopy }}
      </p>
      <div class="mt-8 flex flex-wrap items-center gap-4">
        <a
          [routerLink]="ctaRoute"
          (click)="onCta()"
          class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-8 py-3.5 text-sm font-semibold text-white shadow-md transition hover:-translate-y-0.5 hover:bg-blue-700 dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-600 dark:shadow-[0_0_28px_rgba(34,211,238,0.4)] dark:hover:shadow-[0_0_40px_rgba(217,70,239,0.45)]"
        >
          {{ ctaLabel }}
        </a>
        @if (featuredCourse) {
          <button
            type="button"
            (click)="onFeatured()"
            class="text-sm font-medium text-slate-600 underline decoration-blue-300 underline-offset-4 transition hover:text-blue-700 dark:text-slate-300 dark:decoration-cyan-500/50 dark:hover:text-cyan-300"
          >
            Open featured: {{ featuredCourse.title | slice : 0 : 32
            }}{{ (featuredCourse.title.length || 0) > 32 ? '…' : '' }}
          </button>
        }
      </div>
    </div>

    <div class="relative lg:col-span-7">
      <div class="relative mx-auto max-w-xl lg:max-w-none">
        <div
          class="relative aspect-[4/3] overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg transition duration-500 hover:border-slate-300 dark:border-cyan-500/25 dark:bg-white/5 dark:shadow-[0_0_40px_rgba(34,211,238,0.2)] dark:backdrop-blur-md dark:hover:border-fuchsia-400/40 dark:hover:shadow-[0_0_48px_rgba(217,70,239,0.25)]"
        >
          <img
            [src]="bannerImageUrl"
            alt=""
            class="h-full w-full object-cover opacity-95 dark:opacity-90"
            loading="eager"
          />
          <div
            class="pointer-events-none absolute inset-0 bg-gradient-to-tr from-slate-900/10 via-transparent to-blue-900/5 dark:from-[#05050c]/80 dark:to-fuchsia-900/20"
          ></div>
        </div>
        <div
          class="absolute -right-4 -bottom-6 w-[55%] max-w-xs overflow-hidden rounded-xl border border-slate-200 bg-white shadow-md dark:border-fuchsia-500/30 dark:bg-[#0c0c18]/90 dark:shadow-[0_0_30px_rgba(217,70,239,0.35)] dark:backdrop-blur-xl sm:right-2 sm:bottom-[-2rem]"
        >
          <img
            [src]="secondaryImageUrl"
            alt=""
            class="aspect-video w-full object-cover"
            loading="lazy"
          />
        </div>

        @if (featuredCourse) {
          <button
            type="button"
            (click)="onFeatured()"
            class="absolute left-4 bottom-4 flex max-w-[min(100%,20rem)] flex-col gap-1 rounded-xl border border-slate-200 bg-white/95 p-4 text-left shadow-lg backdrop-blur-sm transition hover:border-blue-300 dark:border-white/10 dark:bg-[#0a0a14]/85 dark:shadow-[0_0_24px_rgba(34,211,238,0.2)] dark:backdrop-blur-xl dark:hover:border-cyan-400/40"
          >
            <span
              class="text-[10px] font-bold uppercase tracking-wider text-blue-700 dark:text-fuchsia-300"
              >Featured course</span
            >
            <span class="line-clamp-2 text-sm font-semibold text-slate-900 dark:text-white">{{
              featuredCourse.title
            }}</span>
            <span class="text-xs text-blue-600 dark:text-cyan-300/90"
              >{{ featuredCourse.rating }} ★ · {{ featuredCourse.lessonCount }} lessons</span
            >
          </button>
        }
      </div>
    </div>
  </div>
</section>
