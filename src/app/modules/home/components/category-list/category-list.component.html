<section
  class="border-b border-slate-100 bg-white py-14 md:py-16 dark:border-white/5 dark:bg-[#080816]/80"
>
  <div class="container">
    <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h2
          class="!text-3xl font-bold tracking-tight text-slate-900 sm:!text-4xl md:!text-5xl dark:!text-white"
        >
          {{ titleParts.before }}
          <span class="relative inline-block">
            <span
              class="text-blue-600 dark:bg-gradient-to-r dark:from-cyan-400 dark:to-fuchsia-500 dark:bg-clip-text dark:text-transparent"
              >{{ highlightWord }}</span
            >
            <span
              class="absolute -bottom-1 left-0 h-1 w-full rounded-full bg-blue-600 dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-500 dark:opacity-80 dark:shadow-[0_0_12px_rgba(217,70,239,0.6)]"
            ></span>
          </span>
          {{ titleParts.after }}
        </h2>
        <p class="mt-3 max-w-2xl text-sm text-slate-600 md:text-base dark:text-slate-400">
          {{ subtitle }}
        </p>
      </div>
      <button
        type="button"
        (click)="onViewAll()"
        class="shrink-0 self-start text-sm font-semibold text-blue-600 transition hover:text-blue-800 dark:text-cyan-400 dark:hover:text-fuchsia-300 sm:self-auto"
      >
        {{ viewAllLabel }} →
      </button>
    </div>

    <div
      class="-mx-4 flex snap-x snap-mandatory gap-4 overflow-x-auto px-4 pb-2 scrollbar-thin md:gap-5"
      style="scrollbar-color: rgba(37, 99, 235, 0.35) transparent"
    >
      @for (cat of categories; track cat.id) {
        <button
          type="button"
          (click)="onSelect(cat)"
          class="group flex min-w-[240px] max-w-[280px] shrink-0 snap-start flex-col rounded-2xl border border-slate-200 bg-white p-5 text-left shadow-sm transition duration-300 hover:-translate-y-1 hover:border-blue-200 hover:shadow-md md:min-w-[260px] dark:border-white/10 dark:bg-white/[0.04] dark:shadow-[0_0_0_1px_rgba(255,255,255,0.02)] dark:backdrop-blur-md dark:hover:border-cyan-400/40 dark:hover:shadow-[0_0_28px_rgba(34,211,238,0.25)]"
        >
          <span
            class="mb-4 flex h-12 w-12 items-center justify-center rounded-xl border border-blue-100 bg-blue-50 text-2xl dark:border-cyan-500/30 dark:bg-gradient-to-br dark:from-cyan-500/15 dark:to-fuchsia-600/20 dark:shadow-[0_0_16px_rgba(34,211,238,0.2)]"
            aria-hidden="true"
            >{{ cat.icon }}</span
          >
          <span
            class="text-base font-semibold text-slate-900 group-hover:text-blue-700 dark:text-white dark:group-hover:text-cyan-200"
            >{{ cat.label }}</span
          >
          <span class="mt-1 text-sm text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-400">{{
            cat.description
          }}</span>
        </button>
      }
    </div>
  </div>
</section>
