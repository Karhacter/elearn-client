<div
  class="relative flex h-full flex-col rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition duration-300 hover:border-slate-300 hover:shadow-md md:p-8 dark:border-white/10 dark:bg-white/[0.04] dark:shadow-[0_0_0_1px_rgba(255,255,255,0.02)] dark:backdrop-blur-xl dark:hover:border-fuchsia-400/30 dark:hover:shadow-[0_0_32px_rgba(217,70,239,0.2)]"
  [ngClass]="
    plan.featured
      ? 'ring-2 ring-blue-500 shadow-md dark:ring-fuchsia-500/50 dark:shadow-[0_0_40px_rgba(217,70,239,0.25)]'
      : ''
  "
>
  @if (plan.featured && plan.featuredBadge) {
    <span
      class="absolute -right-1 top-4 rotate-12 rounded-lg border border-pink-300 bg-pink-600 px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-white shadow-sm dark:border-pink-400/50 dark:bg-gradient-to-r dark:from-pink-600 dark:to-fuchsia-600 dark:shadow-[0_0_16px_rgba(244,114,182,0.5)]"
    >
      {{ plan.featuredBadge }}
    </span>
  }

  <div class="pr-12">
    <h3 class="text-xl font-bold text-slate-900 md:text-2xl dark:text-white">{{ plan.name }}</h3>
    <p class="mt-2 text-sm text-slate-500">{{ plan.audience }}</p>
  </div>

  <div class="mt-8 flex flex-wrap items-baseline gap-1">
    <span
      class="text-4xl font-bold text-blue-700 md:text-5xl dark:text-cyan-300 dark:drop-shadow-[0_0_12px_rgba(34,211,238,0.35)]"
      >$</span
    >
    <span class="text-4xl font-bold text-slate-900 md:text-5xl dark:text-white">{{
      price() | number : '1.0-0'
    }}</span>
    <span class="text-lg font-semibold text-blue-600 dark:text-fuchsia-300/90">.99</span>
    <span class="ml-1 text-sm text-slate-500">{{ cycle() }}</span>
  </div>

  <ul class="mt-8 flex flex-1 flex-col gap-3 border-t border-slate-100 pt-8 dark:border-white/10">
    @for (f of plan.features; track f) {
      <li class="flex items-start gap-3 text-sm text-slate-600 dark:text-slate-300">
        <span
          class="mt-0.5 flex h-5 w-5 shrink-0 items-center justify-center rounded-full border border-emerald-200 bg-emerald-50 text-emerald-700 dark:border-emerald-500/40 dark:bg-emerald-500/15 dark:text-emerald-400 dark:shadow-[0_0_8px_rgba(52,211,153,0.35)]"
        >
          <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
          </svg>
        </span>
        {{ f }}
      </li>
    }
  </ul>

  @if (plan.ctaVariant === 'outline') {
    <button
      type="button"
      (click)="onCta()"
      class="mt-8 w-full rounded-xl border-2 border-blue-600 bg-transparent py-3.5 text-sm font-semibold text-blue-700 transition hover:bg-blue-50 dark:border-cyan-500/50 dark:text-cyan-300 dark:hover:border-cyan-400 dark:hover:bg-cyan-500/10 dark:hover:shadow-[0_0_20px_rgba(34,211,238,0.25)]"
    >
      {{ plan.ctaLabel }}
    </button>
  } @else {
    <button
      type="button"
      (click)="onCta()"
      class="mt-8 w-full rounded-xl border border-transparent bg-blue-600 py-3.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-600 dark:shadow-[0_0_24px_rgba(34,211,238,0.35)] dark:hover:brightness-110"
    >
      {{ plan.ctaLabel }}
    </button>
  }
</div>
