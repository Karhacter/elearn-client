<section
  class="border-b border-slate-100 bg-slate-50 py-16 md:py-24 dark:border-white/5 dark:bg-[#070712]"
>
  <div class="container">
    <header class="mx-auto mb-12 max-w-3xl text-center">
      <h2
        class="!text-3xl font-bold tracking-tight text-slate-900 sm:!text-4xl md:!text-5xl dark:!text-white"
      >
        {{ titleParts.before }}
        <span class="relative inline-block">
          <span
            class="text-blue-600 dark:bg-gradient-to-r dark:from-orange-400 dark:via-amber-400 dark:to-fuchsia-500 dark:bg-clip-text dark:text-transparent"
            >{{ highlightWord }}</span
          >
          <span
            class="absolute -bottom-1 left-0 h-1 w-full rounded-full bg-blue-600 dark:bg-gradient-to-r dark:from-orange-500 dark:to-pink-500 dark:opacity-90 dark:shadow-[0_0_14px_rgba(251,146,60,0.55)]"
          ></span>
        </span>
        {{ titleParts.after }}
      </h2>
      <p class="mt-4 text-slate-600 md:text-lg dark:text-slate-500">{{ subtitle }}</p>

      <div
        class="mx-auto mt-10 inline-flex rounded-2xl border border-slate-200 bg-white p-1.5 shadow-sm dark:border-white/10 dark:bg-white/[0.04] dark:shadow-[inset_0_1px_0_rgba(255,255,255,0.06)] dark:backdrop-blur-md"
        role="group"
        aria-label="Billing period"
      >
        <button
          type="button"
          (click)="setBilling('monthly')"
          class="rounded-xl px-6 py-2.5 text-sm font-semibold transition md:px-8"
          [ngClass]="
            billing === 'monthly'
              ? 'bg-blue-600 text-white shadow-sm dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-600 dark:shadow-[0_0_20px_rgba(34,211,238,0.35)]'
              : 'text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white'
          "
        >
          {{ monthlyLabel }}
        </button>
        <button
          type="button"
          (click)="setBilling('annual')"
          class="rounded-xl px-6 py-2.5 text-sm font-semibold transition md:px-8"
          [ngClass]="
            billing === 'annual'
              ? 'bg-blue-600 text-white shadow-sm dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-600 dark:shadow-[0_0_20px_rgba(34,211,238,0.35)]'
              : 'text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white'
          "
        >
          {{ annualLabel }}
        </button>
      </div>
    </header>

    <div
      class="mx-auto grid max-w-5xl grid-cols-1 gap-8 md:grid-cols-2 md:gap-10"
    >
      @for (p of plans; track p.id) {
        <app-pricing-card [plan]="p" [billing]="billing" (ctaClick)="onPlanCta($event)" />
      }
    </div>
  </div>
</section>
