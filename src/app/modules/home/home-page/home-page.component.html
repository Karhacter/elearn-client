<div class="min-h-screen bg-slate-50 text-slate-800 antialiased dark:bg-[#05050c] dark:text-slate-200">
  <app-header
    [navItems]="navItems"
    [user]="user"
    (searchSubmit)="onSearch($event)"
  />

  <main>
    <app-hero [featuredCourse]="featuredCourse" (featuredClick)="onCourse($event)" />

    <app-category-list
      [categories]="categories"
      (categorySelect)="onCategory($event)"
    />

    <app-course-section
      sectionTitle="Find the right course for you"
      highlightWord="course"
      subtitle="Hand-picked paths with ratings, lesson counts, and instructors who show up."
      [courses]="trendingCourses"
      (courseClick)="onCourse($event)"
    />

    <app-course-section
      sectionTitle="Trending in the network"
      highlightWord="network"
      subtitle="What learners are powering through this week."
      viewAllLabel="See all trending"
      [courses]="newCourses"
      (courseClick)="onCourse($event)"
    />

    <app-events-section [events]="events" (viewMore)="onEvent($event)" />

    <app-pricing-section [plans]="pricingPlans" (planSelect)="onPlan($event)" />
  </main>

  <app-promo-banner (ctaClick)="onPromoCta()" />
  <app-footer (newsletterSubmit)="onNewsletter($event)" />
</div>
