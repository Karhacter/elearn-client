<div
  class="relative min-h-screen bg-slate-50 text-slate-800 antialiased dark:bg-[#05050c] dark:text-slate-200"
>
  <div
    class="pointer-events-none fixed inset-0 bg-[linear-gradient(rgba(37,99,235,0.04)_1px,transparent_1px),linear-gradient(90deg,rgba(37,99,235,0.04)_1px,transparent_1px)] bg-[size:48px_48px] opacity-50 dark:bg-[linear-gradient(rgba(34,211,238,0.04)_1px,transparent_1px),linear-gradient(90deg,rgba(34,211,238,0.04)_1px,transparent_1px)] dark:opacity-70"
  ></div>

  <app-header
    [navItems]="navItems"
    [user]="user"
    [categories]="categories"
    (searchSubmit)="onSearch($event)"
    (ctaClick)="onTryFree()"
  />

  <main class="relative">
    <section class="py-8 md:py-12 lg:py-14">
      <div class="container">
        <app-blog-detail
          [post]="post"
          [posts]="posts"
          [categoryOptions]="categoryOptions"
          [tagOptions]="tagOptions"
          [recentPosts]="recentPosts"
        />
      </div>
    </section>
  </main>

  <app-footer (newsletterSubmit)="onNewsletter($event)" />
</div>
