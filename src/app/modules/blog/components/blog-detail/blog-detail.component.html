<div class="grid grid-cols-1 gap-8 lg:grid-cols-[minmax(0,280px)_minmax(0,1fr)] lg:gap-10 lg:items-start">
  <aside class="order-2 lg:order-1">
    <app-blog-sidebar
      [recentPosts]="recentPosts()"
      [categories]="categoryOptions()"
      [tags]="tagOptions()"
      [activeCategory]="sidebarActiveCategory()"
      [activeTag]="sidebarActiveTag()"
    />
  </aside>

  <article class="order-1 min-w-0 lg:order-2">
    @if (post(); as p) {
      <header class="rounded-2xl border border-slate-200/80 bg-white/90 p-6 shadow-sm dark:border-white/10 dark:bg-[#070714]/90 md:p-8">
        <p
          class="text-xs font-bold uppercase tracking-[0.2em] text-blue-600 dark:text-cyan-400 dark:drop-shadow-[0_0_12px_rgba(34,211,238,0.35)]"
        >
          {{ categoryLabel(p.category) }}
        </p>
        <h1 class="mt-3 text-2xl font-black tracking-tight text-slate-900 sm:text-3xl md:text-4xl dark:text-white">
          {{ p.title }}
        </h1>
        <div class="mt-4 flex flex-wrap items-center gap-3 text-sm text-slate-600 dark:text-slate-400">
          <span class="font-semibold text-slate-800 dark:text-slate-200">{{ p.author }}</span>
          <span class="text-slate-300 dark:text-slate-600">·</span>
          <time [attr.datetime]="p.date">{{ p.date | date : 'longDate' }}</time>
        </div>
        <div class="mt-4 flex flex-wrap gap-2">
          @for (t of p.tags; track t) {
            <a
              routerLink="/blog"
              [queryParams]="{ tag: t }"
              class="rounded-lg border border-slate-200 bg-slate-50 px-2.5 py-1 text-xs font-semibold text-slate-700 transition hover:border-blue-300 hover:text-blue-800 dark:border-white/10 dark:bg-white/5 dark:text-slate-300 dark:hover:border-cyan-400/40 dark:hover:text-cyan-300"
            >
              #{{ tagLabel(t) }}
            </a>
          }
        </div>
      </header>

      <div
        class="mt-6 overflow-hidden rounded-2xl border border-slate-200/80 shadow-md dark:border-white/10"
      >
        <img [src]="p.thumbnail" [alt]="p.title" class="aspect-[21/9] w-full object-cover" loading="eager" />
      </div>

      <div
        class="mt-8 space-y-5 rounded-2xl border border-slate-200/80 bg-white/80 p-6 dark:border-white/10 dark:bg-[#070714]/80 md:p-8"
      >
        @for (para of contentParagraphs(); track $index) {
          <p class="text-sm leading-relaxed text-slate-700 dark:text-slate-300">
            {{ para }}
          </p>
        }
      </div>

      <div class="mt-8">
        <a
          routerLink="/blog"
          class="inline-flex items-center gap-2 text-sm font-semibold text-blue-700 transition hover:text-blue-800 dark:text-cyan-300 dark:hover:text-cyan-200"
        >
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          Back to blog
        </a>
      </div>
    } @else {
      <div
        class="rounded-2xl border border-dashed border-slate-200 bg-slate-50/50 px-6 py-16 text-center dark:border-white/10 dark:bg-white/[0.03]"
      >
        <p class="text-slate-600 dark:text-slate-400">Post not found.</p>
        <a routerLink="/blog" class="mt-4 inline-block font-semibold text-blue-700 dark:text-cyan-300">View all posts</a>
      </div>
    }
  </article>
</div>
