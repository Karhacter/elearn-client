<ul class="space-y-4">
  @for (line of lines; track line.id) {
    <li
      class="group flex flex-col gap-4 rounded-2xl border border-slate-200/80 bg-white/80 p-4 shadow-sm backdrop-blur-md transition hover:border-blue-200/80 hover:shadow-md dark:border-white/10 dark:bg-[#070714]/80 dark:hover:border-cyan-500/30 dark:hover:shadow-[0_0_28px_rgba(34,211,238,0.12)] sm:flex-row sm:items-center"
    >
      <a
        [routerLink]="['/courses', line.courseId]"
        class="relative aspect-video w-full shrink-0 overflow-hidden rounded-xl sm:aspect-square sm:h-24 sm:w-36"
      >
        <img
          [src]="line.thumbnailUrl"
          [alt]="line.title"
          class="h-full w-full object-cover transition duration-300 group-hover:scale-105"
        />
      </a>

      <div class="min-w-0 flex-1">
        <a
          [routerLink]="['/courses', line.courseId]"
          class="text-base font-bold text-slate-900 transition hover:text-blue-700 dark:text-white dark:hover:text-cyan-300"
        >
          {{ line.title }}
        </a>
        <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
          <span class="font-medium text-slate-500 dark:text-slate-500">Instructor</span>
          {{ line.instructorName }}
        </p>
        <p class="mt-2 text-lg font-black text-blue-700 dark:text-cyan-300 dark:drop-shadow-[0_0_10px_rgba(34,211,238,0.25)]">
          <span>$</span>{{ line.unitPrice | number : '1.0-0' }}
          <span class="text-xs font-semibold text-slate-500 dark:text-slate-400">/ seat</span>
        </p>
      </div>

      <div class="flex flex-wrap items-center justify-between gap-3 sm:flex-col sm:items-end">
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Qty</span>
          <div
            class="inline-flex items-center rounded-xl border border-slate-200 bg-slate-50/80 dark:border-white/10 dark:bg-white/5"
          >
            <button
              type="button"
              (click)="quantityChange.emit({ lineId: line.id, quantity: line.quantity - 1 })"
              class="px-3 py-2 text-slate-600 transition hover:bg-slate-100 disabled:opacity-40 dark:text-slate-300 dark:hover:bg-white/10"
              [disabled]="line.quantity <= 1"
              aria-label="Decrease quantity"
            >
              −
            </button>
            <span class="min-w-[2rem] text-center text-sm font-bold tabular-nums text-slate-900 dark:text-white">{{
              line.quantity
            }}</span>
            <button
              type="button"
              (click)="quantityChange.emit({ lineId: line.id, quantity: line.quantity + 1 })"
              class="px-3 py-2 text-slate-600 transition hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-white/10"
              aria-label="Increase quantity"
            >
              +
            </button>
          </div>
        </div>

        <button
          type="button"
          (click)="remove.emit(line.id)"
          class="text-sm font-semibold text-red-600 transition hover:text-red-700 dark:text-red-400 dark:hover:text-red-300"
        >
          Remove
        </button>
      </div>
    </li>
  }
</ul>
