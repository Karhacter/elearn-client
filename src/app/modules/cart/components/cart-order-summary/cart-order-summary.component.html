<div
  class="rounded-2xl border border-slate-200/80 bg-white/85 p-6 shadow-xl shadow-slate-200/40 backdrop-blur-md dark:border-white/10 dark:bg-[#070714]/85 dark:shadow-[0_0_40px_rgba(34,211,238,0.1)]"
>
  <h2 class="text-lg font-black tracking-tight text-slate-900 dark:text-white">Order summary</h2>

  <dl class="mt-6 space-y-3 text-sm">
    <div class="flex justify-between gap-4">
      <dt class="text-slate-600 dark:text-slate-400">Subtotal</dt>
      <dd class="font-semibold tabular-nums text-slate-900 dark:text-white">
        <span>$</span>{{ subtotal | number : '1.2-2' }}
      </dd>
    </div>
    @if (discount && discount.amount > 0) {
      <div class="flex justify-between gap-4">
        <dt class="text-slate-600 dark:text-slate-400">
          Discount
          <span class="mt-0.5 block text-xs font-normal text-blue-600 dark:text-cyan-400">{{ discount.label }}</span>
        </dt>
        <dd class="font-semibold tabular-nums text-emerald-600 dark:text-emerald-400">
          −<span>$</span>{{ discount.amount | number : '1.2-2' }}
        </dd>
      </div>
    }
    <div
      class="flex justify-between gap-4 border-t border-slate-200 pt-4 dark:border-white/10"
    >
      <dt class="text-base font-bold text-slate-900 dark:text-white">Total</dt>
      <dd
        class="text-xl font-black tabular-nums text-blue-700 dark:text-cyan-300 dark:drop-shadow-[0_0_14px_rgba(34,211,238,0.35)]"
      >
        <span>$</span>{{ total | number : '1.2-2' }}
      </dd>
    </div>
  </dl>

  <button
    type="button"
    [disabled]="disabledCheckout"
    (click)="proceed.emit()"
    class="mt-6 w-full rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-gradient-to-r dark:from-cyan-500 dark:to-fuchsia-600 dark:shadow-[0_0_24px_rgba(34,211,238,0.35)] dark:hover:brightness-110"
  >
    Proceed to Checkout
  </button>

  <a
    routerLink="/courses/grid"
    class="mt-4 block text-center text-sm font-semibold text-blue-700 transition hover:text-blue-800 dark:text-cyan-300 dark:hover:text-cyan-200"
  >
    Continue browsing courses
  </a>
</div>
