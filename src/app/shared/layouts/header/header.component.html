<header
  class="fixed top-0 z-40 w-full transition-all duration-300"
  [ngClass]="sticky ? ' shadow-lg bg-white py-4' : 'shadow-none py-4'"
>
  <div>
    <div class="container mx-auto max-w-7xl px-4 flex items-center justify-between">
      <app-logo></app-logo>
      <nav class="hidden lg:flex grow items-center gap-8 justify-start ml-14">
        @for (item of headerData; track item.label) {
          <a
            [href]="item.href"
            (click)="scrollTo(item.href, $event)"
            class="text-black hover:text-primary px-3 py-4 text-lg font-normal opacity-70 hover:opacity-100 cursor-pointer"
          >
            {{ item.label }}
          </a>
        }
      </nav>
      <div class="flex items-center gap-4">
        <button
          class="hidden lg:block bg-transparent text-primary border hover:bg-primary border-primary hover:text-white duration-300 px-6 py-2 rounded-lg hover:cursor-pointer"
          (click)="openSignIn()"
        >
          Sign In
        </button>

        @if (isSignInOpen) {
          <div class="fixed top-0 left-0 w-full h-full bg-black/50 flex items-center justify-center z-50 modal-overlay" (mousedown)="onModalClick($event, 'signin')">
            <div
              class="relative mx-auto w-full max-w-md overflow-hidden rounded-lg px-8 pt-14 pb-8 text-center backdrop-blur-md bg-white"
            >
              <button
                (click)="closeSignIn()"
                class="absolute top-0 right-0 mr-8 mt-8 dark:invert"
                aria-label="Close Sign In Modal"
              >
                <iconify-icon
                  icon="material-symbols:close-rounded"
                  width="24"
                  height="24"
                  class="text-black hover:text-primary inline-block hover:cursor-pointer"
                ></iconify-icon>
              </button>
              <app-signin></app-signin>
            </div>
          </div>
        }

        <button
          class="hidden lg:block bg-primary text-white text-base font-medium hover:bg-transparent duration-300 hover:text-primary border border-primary px-6 py-2 rounded-lg hover:cursor-pointer"
          (click)="openSignUp()"
        >
          Sign Up
        </button>

        @if (isSignUpOpen) {
          <div class="fixed top-0 left-0 w-full h-full bg-black/50 flex items-center justify-center z-50 modal-overlay" (mousedown)="onModalClick($event, 'signup')">
            <div
              class="relative mx-auto bg-white w-full max-w-md overflow-hidden rounded-lg backdrop-blur-md px-8 pt-14 pb-8 text-center"
            >
              <button
                (click)="closeSignUp()"
                class="absolute top-0 right-0 mr-8 mt-8 dark:invert"
                aria-label="Close Sign Up Modal"
              >
                <iconify-icon
                  icon="material-symbols:close-rounded"
                  width="24"
                  height="24"
                  class="text-black hover:text-primary inline-block hover:cursor-pointer"
                ></iconify-icon>
              </button>
              <app-signup></app-signup>
            </div>
          </div>
        }

        <button
          (click)="toggleNavbar()"
          class="block lg:hidden p-2 rounded-lg"
          aria-label="Toggle mobile menu"
        >
          <span class="block w-6 h-0.5 bg-black"></span>
          <span class="block w-6 h-0.5 bg-black mt-1.5"></span>
          <span class="block w-6 h-0.5 bg-black mt-1.5"></span>
        </button>
      </div>
    </div>

    @if (navbarOpen) {
      <div class="fixed top-0 left-0 w-full h-full bg-black/50 z-40 modal-overlay" (mousedown)="closeNavbar()"></div>
    }

    <div
      class="lg:hidden fixed top-0 right-0 h-full w-full bg-white shadow-lg transform transition-transform duration-300 max-w-xs z-50"
      [ngClass]="navbarOpen ? 'translate-x-0' : 'translate-x-full'"
    >
      <div class="flex items-center justify-between p-4">
        <h2 class="text-lg font-bold text-midnight_text">
          <app-logo></app-logo>
        </h2>
        <button
          (click)="closeNavbar()"
          class="bg-black/30 rounded-full p-1 text-white"
          aria-label="Close menu Modal"
        >
          <iconify-icon
            icon="material-symbols:close-rounded"
            width="24"
            height="24"
          ></iconify-icon>
        </button>
      </div>
      <nav class="flex flex-col items-start p-4">
        @for (item of headerData; track item.label) {
          <a
            [href]="item.href"
            (click)="scrollTo(item.href, $event)"
            class="text-black hover:text-primary px-3 py-4 text-lg font-normal opacity-70 hover:opacity-100 cursor-pointer"
          >
            {{ item.label }}
          </a>
        }
        <div class="mt-4 flex flex-col gap-4 w-full">
          <button
            class="bg-primary text-white px-4 py-2 rounded-lg border border-primary hover:text-primary hover:bg-transparent hover:cursor-pointer transition duration-300 ease-in-out"
            (click)="openSignIn(); closeNavbar()"
          >
            Sign In
          </button>
          <button
            class="bg-primary text-white px-4 py-2 rounded-lg border border-primary hover:text-primary hover:bg-transparent hover:cursor-pointer transition duration-300 ease-in-out"
            (click)="openSignUp(); closeNavbar()"
          >
            Sign Up
          </button>
        </div>
      </nav>
    </div>
  </div>
</header>
